name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # GitHub Secrets에 DOCKERHUB_USERNAME, DOCKERHUB_TOKEN 환경변수를 설정해야 합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 저장소 이름은 'ootd-color-analyzer'로 가정합니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ootd-color-analyzer:latest
          no-cache: true
          
  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | /Applications/Docker.app/Contents/Resources/bin/docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull latest Docker image
        run: /Applications/Docker.app/Contents/Resources/bin/docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ootd-color-analyzer:latest

      - name: Stop and remove existing container (if exists)
        run: |
          /Applications/Docker.app/Contents/Resources/bin/docker stop ootd-app || true
          /Applications/Docker.app/Contents/Resources/bin/docker rm ootd-app || true

      - name: Run new container
        run: |
          /Applications/Docker.app/Contents/Resources/bin/docker run -d \
            --name ootd-app \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/ootd-color-analyzer:latest 